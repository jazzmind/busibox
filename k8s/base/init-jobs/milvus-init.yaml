---
# Milvus Schema Initialization
# Creates the 'documents' collection with hybrid search support
apiVersion: batch/v1
kind: Job
metadata:
  name: milvus-init
  labels:
    app: milvus-init
    tier: init
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        app: milvus-init
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-milvus
          image: busybox:1.36
          command: ['sh', '-c', 'until wget -q -O /dev/null http://milvus:9091/healthz; do echo "Waiting for Milvus..."; sleep 10; done']
      containers:
        - name: milvus-init
          image: localhost:30500/milvus-init:latest
          env:
            - name: MILVUS_HOST
              value: "milvus"
          command: ["python", "/app/hybrid_schema.py"]
