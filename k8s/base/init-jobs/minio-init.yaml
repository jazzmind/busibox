---
# MinIO bucket initialization
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-init
  labels:
    app: minio-init
    tier: init
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        app: minio-init
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-minio
          image: busybox:1.36
          command: ['sh', '-c', 'until wget -q -O /dev/null http://minio:9000/minio/health/live; do echo "Waiting for MinIO..."; sleep 5; done']
      containers:
        - name: mc
          image: minio/mc
          env:
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: busibox-secrets
                  key: MINIO_ACCESS_KEY
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: busibox-secrets
                  key: MINIO_SECRET_KEY
          command:
            - /bin/sh
            - -c
            - |
              mc alias set myminio http://minio:9000 $MINIO_ACCESS_KEY $MINIO_SECRET_KEY
              mc mb myminio/documents --ignore-existing
              mc mb myminio/exports --ignore-existing
              mc anonymous set download myminio/exports
              echo "Buckets created successfully"
