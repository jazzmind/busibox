---
# Shared Persistent Storage
# =========================
# Two shared PVCs for the entire cluster. Services use subPath to isolate
# their data within the shared volume. This minimizes the number of Cinder
# volumes and keeps costs low on Rackspace Spot.
#
# Rackspace Spot Gen-1 storage class size ranges:
#   ssd:        5-20 GB   ($0.06/GB-mo)
#   ssd-large:  >= 50 GB  ($0.06/GB-mo)  -- gap: 20-50 GB not supported
#   sata:       5-20 GB   ($0.02/GB-mo)
#   sata-large: >= 75 GB  ($0.02/GB-mo)  -- gap: 20-75 GB not supported
#
# Total: 50GB SSD + 75GB SATA = ~$4.50/mo

# Database SSD - postgres, milvus, neo4j, etcd
# SSD for database workloads requiring higher IOPS
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: db-ssd
  labels:
    tier: infrastructure
    storage-role: database
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: ssd-large
  resources:
    requests:
      storage: 50Gi
---
# Object storage - minio (also used by milvus via dedicated bucket)
# SATA tier - lower cost, sufficient for blob/object workloads
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: objects-store
  labels:
    tier: infrastructure
    storage-role: objects
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: sata-large
  resources:
    requests:
      storage: 75Gi
