apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Production overlay for Rackspace Spot
# Storage: ssd-large (50Gi) + sata-large (75Gi) = ~$4.50/mo
# For staging (minimum storage), use rackspace-spot-staging overlay instead

namespace: busibox

labels:
  - pairs:
      environment: rackspace-spot
      app.kubernetes.io/part-of: busibox

resources:
  - ../../base

patches:
  # Milvus - production sizing
  - target:
      kind: Deployment
      name: milvus
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 6Gi
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 2Gi

  # PostgreSQL - production sizing
  - target:
      kind: Deployment
      name: postgres
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 2Gi
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 512Mi

  # AI capability settings (generated by install wizard)
  - path: ai-capabilities-patch.yaml
