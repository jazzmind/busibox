apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Apply to busibox namespace
namespace: busibox

# Labels for all resources
labels:
  - pairs:
      environment: rackspace-spot-staging
      app.kubernetes.io/part-of: busibox

resources:
  - ../../base

patches:
  # Staging storage: use minimum sizes to reduce cost
  # Gen-1: ssd 5-20GB, sata 5-20GB (cheapest option)
  - target:
      kind: PersistentVolumeClaim
      name: db-ssd
    patch: |
      - op: replace
        path: /spec/storageClassName
        value: ssd
      - op: replace
        path: /spec/resources/requests/storage
        value: 20Gi

  - target:
      kind: PersistentVolumeClaim
      name: objects-store
    patch: |
      - op: replace
        path: /spec/storageClassName
        value: sata
      - op: replace
        path: /spec/resources/requests/storage
        value: 20Gi

  # Milvus - reduced for staging
  - target:
      kind: Deployment
      name: milvus
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 4Gi
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 1Gi

  # PostgreSQL - reduced for staging
  - target:
      kind: Deployment
      name: postgres
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 1Gi
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 256Mi

  # AI capability settings (generated by install wizard)
  - path: ai-capabilities-patch.yaml
