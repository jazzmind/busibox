openapi: 3.0.3
info:
  title: Busibox AuthZ API
  description: |
    Authorization and authentication service for Busibox platform.
    
    Provides:
    - OAuth2 token issuance (token-exchange grant)
    - RBAC management (roles, users, permissions)
    - Audit logging
    - JWKS endpoint for token validation
    
    **Authentication**: Zero Trust JWT access tokens.
  version: 1.0.0
  contact:
    name: Busibox Team

servers:
  - url: http://10.96.200.210:8010
    description: Production AuthZ Service
  - url: http://10.96.201.210:8010
    description: Test AuthZ Service

tags:
  - name: OAuth
    description: OAuth2 token endpoints
  - name: Admin
    description: RBAC management endpoints
  - name: Keystore
    description: Envelope encryption key management
  - name: Internal
    description: Internal sync endpoints for first-party services
  - name: Audit
    description: Audit logging endpoints
  - name: Health
    description: Health check endpoints

paths:
  /.well-known/jwks.json:
    get:
      tags: [OAuth]
      summary: Get JSON Web Key Set
      description: Returns public keys for JWT signature validation. Used by downstream services to validate tokens.
      operationId: getJWKS
      responses:
        '200':
          description: JWKS response
          content:
            application/json:
              schema:
                type: object
                properties:
                  keys:
                    type: array
                    items:
                      $ref: '#/components/schemas/JWK'

  /oauth/token:
    post:
      tags: [OAuth]
      summary: OAuth2 Token Endpoint
      description: |
        Issue access tokens using OAuth2 grants.
        
        Supported grant types:
        - `urn:ietf:params:oauth:grant-type:token-exchange`: On-behalf-of user tokens (RFC 8693)
        
        Accepts both `application/x-www-form-urlencoded` and `application/json` content types.
      operationId: token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OAuthTokenRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/OAuthTokenRequest'
      responses:
        '200':
          description: Token issued successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthTokenResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Invalid subject token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Unauthorized audience or scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /admin/roles:
    get:
      tags: [Admin]
      summary: List all roles
      description: Returns all roles in the system. Requires admin authentication.
      operationId: listRoles
      security:
        - AdminToken: []
        - OAuthClient: []
      responses:
        '200':
          description: List of roles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RoleResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [Admin]
      summary: Create a new role
      description: Creates a new role. Requires admin authentication.
      operationId: createRole
      security:
        - AdminToken: []
        - OAuthClient: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoleCreate'
      responses:
        '200':
          description: Role created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /admin/roles/{role_id}:
    get:
      tags: [Admin]
      summary: Get a specific role
      description: Returns details of a specific role by ID. Requires admin authentication.
      operationId: getRole
      security:
        - AdminToken: []
        - OAuthClient: []
      parameters:
        - name: role_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Role details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Admin]
      summary: Update a role
      description: Updates an existing role. Requires admin authentication.
      operationId: updateRole
      security:
        - AdminToken: []
        - OAuthClient: []
      parameters:
        - name: role_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoleUpdate'
      responses:
        '200':
          description: Role updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Admin]
      summary: Delete a role
      description: Deletes a role and all associated user-role bindings. Requires admin authentication.
      operationId: deleteRole
      security:
        - AdminToken: []
        - OAuthClient: []
      parameters:
        - name: role_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Role deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  deleted:
                    type: boolean
                    example: true
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /admin/user-roles:
    post:
      tags: [Admin]
      summary: Add user-role binding
      description: Assigns a role to a user. Requires admin authentication.
      operationId: addUserRole
      security:
        - AdminToken: []
        - OAuthClient: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRoleBinding'
      responses:
        '200':
          description: User-role binding created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserRoleBindingResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

    delete:
      tags: [Admin]
      summary: Remove user-role binding
      description: Removes a role from a user. Requires admin authentication.
      operationId: removeUserRole
      security:
        - AdminToken: []
        - OAuthClient: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRoleBinding'
      responses:
        '200':
          description: User-role binding removed
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  deleted:
                    type: boolean
                    example: true
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /admin/users/{user_id}/roles:
    get:
      tags: [Admin]
      summary: Get user roles
      description: Returns all roles assigned to a specific user. Requires admin authentication.
      operationId: getUserRoles
      security:
        - AdminToken: []
        - OAuthClient: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of user roles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RoleResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /authz/audit:
    post:
      tags: [Audit]
      summary: Log audit event
      description: |
        Appends an audit log entry. Can optionally include Authorization header with JWT
        to propagate user context.
      operationId: audit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuditEvent'
      responses:
        '200':
          description: Audit event logged
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
        '400':
          $ref: '#/components/responses/BadRequest'

  # ============================================================================
  # Keystore Endpoints (Envelope Encryption)
  # ============================================================================
  
  /keystore/kek:
    post:
      tags: [Keystore]
      summary: Create Key Encryption Key
      description: |
        Creates a new KEK for a role, user, or system.
        The KEK is generated, encrypted with the master key, and stored.
      operationId: createKek
      security:
        - AdminToken: []
        - OAuthClient: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateKekRequest'
      responses:
        '200':
          description: KEK created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KekResponse'
        '409':
          description: KEK already exists for this owner
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /keystore/kek/{owner_type}/{owner_id}:
    get:
      tags: [Keystore]
      summary: Get KEK metadata
      description: Returns KEK metadata for an owner (does not return the key itself).
      operationId: getKek
      security:
        - AdminToken: []
        - OAuthClient: []
      parameters:
        - name: owner_type
          in: path
          required: true
          schema:
            type: string
            enum: [role, user, system]
        - name: owner_id
          in: path
          required: true
          schema:
            type: string
            description: UUID of owner or 'system' for system keys
      responses:
        '200':
          description: KEK metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KekResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /keystore/kek/ensure-for-role/{role_id}:
    post:
      tags: [Keystore]
      summary: Ensure KEK exists for role
      description: |
        Idempotent operation that ensures a KEK exists for a role.
        Returns existing KEK if present, creates new one if not.
      operationId: ensureKekForRole
      security:
        - AdminToken: []
        - OAuthClient: []
      parameters:
        - name: role_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: KEK metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KekResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /keystore/kek/rotate:
    post:
      tags: [Keystore]
      summary: Rotate KEK
      description: |
        Rotates a KEK by creating a new version and marking old ones inactive.
        Existing wrapped DEKs using the old version will need re-wrapping.
      operationId: rotateKek
      security:
        - AdminToken: []
        - OAuthClient: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RotateKekRequest'
      responses:
        '200':
          description: New KEK version created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KekResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /keystore/encrypt:
    post:
      tags: [Keystore]
      summary: Encrypt content
      description: |
        Encrypts file content using envelope encryption.
        1. Generates a new DEK for the file
        2. Encrypts content with the DEK
        3. Wraps the DEK with KEKs for specified roles/user
        4. Stores wrapped DEKs in the keystore
      operationId: encryptContent
      security:
        - AdminToken: []
        - OAuthClient: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EncryptContentRequest'
      responses:
        '200':
          description: Content encrypted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EncryptContentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /keystore/decrypt:
    post:
      tags: [Keystore]
      summary: Decrypt content
      description: |
        Decrypts file content. Requires the caller to have access to at least
        one KEK that can unwrap the file's DEK.
      operationId: decryptContent
      security:
        - AdminToken: []
        - OAuthClient: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DecryptContentRequest'
      responses:
        '200':
          description: Content decrypted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DecryptContentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: No access to decrypt this file
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /keystore/file/{file_id}/add-role/{role_id}:
    post:
      tags: [Keystore]
      summary: Grant role access to file
      description: |
        Adds a role's access to a file by wrapping the DEK with the role's KEK.
        Requires an existing wrapped DEK to re-wrap for the new role.
      operationId: addRoleAccess
      security:
        - AdminToken: []
        - OAuthClient: []
      parameters:
        - name: file_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: role_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Role access added
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  file_id:
                    type: string
                  role_id:
                    type: string
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /keystore/file/{file_id}/remove-role/{role_id}:
    delete:
      tags: [Keystore]
      summary: Revoke role access to file
      description: Removes a role's access to a file by deleting their wrapped DEK.
      operationId: removeRoleAccess
      security:
        - AdminToken: []
        - OAuthClient: []
      parameters:
        - name: file_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: role_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Role access removed
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  file_id:
                    type: string
                  role_id:
                    type: string
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /keystore/file/{file_id}:
    delete:
      tags: [Keystore]
      summary: Delete file keys
      description: Deletes all wrapped DEKs for a file (called when file is deleted).
      operationId: deleteFileKeys
      security:
        - AdminToken: []
        - OAuthClient: []
      parameters:
        - name: file_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: File keys deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  file_id:
                    type: string
                  deleted_count:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ============================================================================
  # Health Endpoints
  # ============================================================================

  /health/live:
    get:
      tags: [Health]
      summary: Liveness check
      description: Returns OK if service is running
      operationId: healthLive
      responses:
        '200':
          description: Service is alive
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /health/ready:
    get:
      tags: [Health]
      summary: Readiness check
      description: Returns OK if service is ready to accept requests
      operationId: healthReady
      responses:
        '200':
          description: Service is ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

components:
  securitySchemes:
    AdminToken:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token issued by authz

    OAuthClient:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token issued by authz

    BearerJWT:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token issued by authz

  schemas:
    JWK:
      type: object
      description: JSON Web Key
      properties:
        kty:
          type: string
          example: RSA
        use:
          type: string
          example: sig
        kid:
          type: string
          example: key-2024-12-15
        alg:
          type: string
          example: RS256
        n:
          type: string
          description: RSA modulus (base64url)
        e:
          type: string
          description: RSA exponent (base64url)

    OAuthTokenRequest:
      type: object
      required:
        - grant_type
        - subject_token
        - audience
      properties:
        grant_type:
          type: string
          enum:
            - urn:ietf:params:oauth:grant-type:token-exchange
          description: OAuth2 grant type
        audience:
          type: string
          description: Target service (e.g., data-api, search-api, agent-api)
          example: data-api
        scope:
          type: string
          description: Space-delimited OAuth2 scopes
          example: data.write data.read
        requested_purpose:
          type: string
          description: Purpose label for audit logging
          example: document-upload
        subject_token:
          type: string
          description: RFC 8693 subject token (optional)
        subject_token_type:
          type: string
          description: RFC 8693 subject token type (optional)

    OAuthTokenResponse:
      type: object
      required:
        - access_token
        - token_type
        - expires_in
      properties:
        access_token:
          type: string
          description: JWT access token
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
          description: Token lifetime in seconds
          example: 900
        scope:
          type: string
          description: Granted scopes (space-delimited)
          example: data.write data.read
        issued_token_type:
          type: string
          description: RFC 8693 issued token type
          example: urn:ietf:params:oauth:token-type:access_token

    AccessTokenClaims:
      type: object
      description: |
        JWT access token claims. 
        
        **Important**: Scopes are aggregated from all user roles and stored at the token level.
        Roles in the token contain only `id` and `name` (for data access filtering via RLS/partitions).
      required:
        - iss
        - sub
        - aud
        - exp
        - iat
        - nbf
        - jti
        - typ
      properties:
        iss:
          type: string
          description: Issuer (authz service)
          example: busibox-authz
        sub:
          type: string
          description: Subject (user ID)
          example: user-123
        aud:
          type: string
          description: Audience (target service)
          example: data-api
        exp:
          type: integer
          description: Expiration time (Unix timestamp)
        iat:
          type: integer
          description: Issued at (Unix timestamp)
        nbf:
          type: integer
          description: Not before (Unix timestamp)
        jti:
          type: string
          format: uuid
          description: JWT ID (unique token identifier)
        typ:
          type: string
          description: Token type
          example: access
        scope:
          type: string
          description: |
            Aggregated OAuth2 scopes (space-delimited). 
            For token-exchange, this is the union of scopes from all user roles.
          example: data.read data.write search.read
        roles:
          type: array
          description: |
            User roles (for data access filtering). Contains only id and name.
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
                description: Role UUID (used for RLS filtering and Milvus partition selection)
              name:
                type: string
                example: Finance Admin
                description: Human-readable role name

    RoleCreate:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
          example: Editor
        description:
          type: string
          example: Can edit documents
        scopes:
          type: array
          description: OAuth2 scopes granted by this role
          items:
            type: string
          example: [data.read, data.write, search.read]

    RoleUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
        scopes:
          type: array
          description: OAuth2 scopes granted by this role
          items:
            type: string
          example: [data.read, data.write, search.read]

    RoleResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: Editor
        description:
          type: string
          example: Can edit documents
        scopes:
          type: array
          description: OAuth2 scopes granted by this role
          items:
            type: string
          example: [data.read, data.write, search.read]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    UserRoleBinding:
      type: object
      required:
        - user_id
        - role_id
      properties:
        user_id:
          type: string
          format: uuid
        role_id:
          type: string
          format: uuid

    UserRoleBindingResponse:
      type: object
      properties:
        user_id:
          type: string
          format: uuid
        role_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time

    SyncRole:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string

    SyncUser:
      type: object
      required:
        - user_id
        - email
      properties:
        user_id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        status:
          type: string
          example: active
        roles:
          type: array
          items:
            $ref: '#/components/schemas/SyncRole'
        user_role_ids:
          type: array
          description: Role IDs or names to assign to user
          items:
            type: string
        idp_provider:
          type: string
          example: azure
        idp_tenant_id:
          type: string
        idp_object_id:
          type: string
        idp_roles:
          type: array
          items:
            type: string
        idp_groups:
          type: array
          items:
            type: string

    AuditEvent:
      type: object
      required:
        - actorId
        - action
        - resourceType
      properties:
        actorId:
          type: string
          description: User or service performing the action
        action:
          type: string
          description: Action performed
          example: document.upload
        resourceType:
          type: string
          description: Type of resource affected
          example: document
        resourceId:
          type: string
          description: ID of resource affected
        details:
          type: object
          description: Additional event details
          additionalProperties: true

    Error:
      type: object
      properties:
        error:
          type: string
          description: Error code
        detail:
          type: string
          description: Error details

    # ========================================================================
    # Keystore Schemas (Envelope Encryption)
    # ========================================================================
    
    CreateKekRequest:
      type: object
      required:
        - owner_type
      properties:
        owner_type:
          type: string
          enum: [role, user, system]
          description: Type of owner for the KEK
        owner_id:
          type: string
          format: uuid
          description: UUID of the role or user (null for system keys)

    KekResponse:
      type: object
      properties:
        kek_id:
          type: string
          format: uuid
          description: Unique identifier for the KEK
        owner_type:
          type: string
          enum: [role, user, system]
        owner_id:
          type: string
          format: uuid
          nullable: true
        key_algorithm:
          type: string
          example: AES-256-GCM
        key_version:
          type: integer
          description: Version number (incremented on rotation)
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time

    RotateKekRequest:
      type: object
      required:
        - owner_type
      properties:
        owner_type:
          type: string
          enum: [role, user, system]
        owner_id:
          type: string
          format: uuid
          nullable: true

    EncryptContentRequest:
      type: object
      required:
        - file_id
        - content
      properties:
        file_id:
          type: string
          format: uuid
          description: UUID of the file
        content:
          type: string
          description: Base64 encoded content to encrypt
        role_ids:
          type: array
          items:
            type: string
            format: uuid
          description: Role IDs that should have access
        user_id:
          type: string
          format: uuid
          description: User ID for personal files

    EncryptContentResponse:
      type: object
      properties:
        file_id:
          type: string
          format: uuid
        encrypted_content:
          type: string
          description: Base64 encoded encrypted content
        wrapped_dek_count:
          type: integer
          description: Number of KEKs the DEK was wrapped with

    DecryptContentRequest:
      type: object
      required:
        - file_id
        - encrypted_content
      properties:
        file_id:
          type: string
          format: uuid
        encrypted_content:
          type: string
          description: Base64 encoded encrypted content

    DecryptContentResponse:
      type: object
      properties:
        file_id:
          type: string
          format: uuid
        content:
          type: string
          description: Base64 encoded decrypted content

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'




