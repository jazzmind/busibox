; =============================================================================
; Supervisord Configuration for Builder Sandbox
; =============================================================================
;
; Base configuration. Project-specific programs are written dynamically to:
;   /etc/supervisor/conf.d/<project_id>.conf
;
; Useful commands:
;   supervisorctl status
;   supervisorctl start <project_id>
;   supervisorctl stop <project_id>
;   supervisorctl restart <project_id>
;   supervisorctl tail -f <project_id>
;   supervisorctl reread && supervisorctl update
;
; =============================================================================

[unix_http_server]
file=/var/run/supervisor.sock
chmod=0700

[supervisord]
nodaemon=true
logfile=/dev/stdout
logfile_maxbytes=0
pidfile=/var/run/supervisord.pid
childlogdir=/var/log/supervisor
user=root
loglevel=info

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[include]
files = /etc/supervisor/conf.d/*.conf

[eventlistener:stdout]
command=cat
buffer_size=100
events=PROCESS_LOG
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
