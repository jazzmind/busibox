# =============================================================================
# Supervisord Configuration for Core Apps Container
# =============================================================================
#
# Manages frontend Next.js applications:
#   - busibox-portal      (port 3000)
#   - busibox-agents      (port 3001)
#   - busibox-admin       (port 3002)
#   - busibox-chat        (port 3003)
#   - busibox-appbuilder  (port 3004)
#   - busibox-media       (port 3005)
#   - busibox-documents   (port 3006)
#
# Process management:
#   - Apps start as autostart=false, started by entrypoint after deployment
#   - Use supervisorctl to manage individual processes
#
# Log files are written to /var/log/supervisor/ so that `supervisorctl tail -f`
# works correctly. Using /dev/stdout as the log target breaks `tail -f` because
# character devices are not seekable.
#
# Commands:
#   supervisorctl status           - Show all process status
#   supervisorctl restart busibox-portal - Restart Busibox Portal
#   supervisorctl stop busibox-agents - Stop Agent Manager
#   supervisorctl tail -f busibox-portal - Follow Busibox Portal logs
#
# =============================================================================

[supervisord]
nodaemon=true
logfile=/dev/stdout
logfile_maxbytes=0
pidfile=/var/run/supervisord.pid
childlogdir=/var/log/supervisor
user=root
loglevel=info

# =============================================================================
# Busibox Portal - Next.js Application
# =============================================================================
# Starts with autostart=false - entrypoint script starts after deployment
# Uses standalone output mode for minimal memory footprint (~300-500MB vs ~3.5GB)
# autorestart=true - restart automatically if the process crashes
[program:busibox-portal]
command=node apps/portal/server.js
directory=/srv/busibox-portal/.next/standalone
environment=PORT="3000",HOSTNAME="0.0.0.0",NODE_ENV="production",NEXT_PUBLIC_BASE_PATH="/portal",NODE_OPTIONS="--max-old-space-size=512"
autostart=false
autorestart=true
priority=20
startsecs=10
startretries=5
stopwaitsecs=10
stdout_logfile=/var/log/supervisor/busibox-portal-stdout.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=2
stderr_logfile=/var/log/supervisor/busibox-portal-stderr.log
stderr_logfile_maxbytes=10MB
stderr_logfile_backups=2

