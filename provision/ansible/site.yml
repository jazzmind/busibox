# Deployment order optimized for dependencies:
# 1. PostgreSQL (database - required by many services)
# 2. Agent API (provides webhooks for MinIO)
# 3. MinIO (file storage - can configure webhook to agent API)
# 4. Milvus (vector database)
# 5. Ingest Worker (needs agent API + MinIO)

- hosts: pg
  roles: [postgres]

- hosts: agent
  roles:
    - node_common
    - agent_api
    - deploywatch
    - role: secrets
      tags: [secrets]
    - role: app_deployer
      tags: [app_deployer]

- hosts: files
  roles: [minio]

- hosts: milvus
  roles: [milvus]

- hosts: ingest
  roles: [node_common, ingest_worker]

- hosts: apps
  roles:
    - node_common
    - role: secrets
      tags: [secrets]
    - role: nextjs_app
      tags: [apps, nextjs]
    - role: app_deployer
      tags: [app_deployer]

- hosts: proxy
  roles:
    - role: nginx
      tags: [proxy, nginx]

- hosts: openwebui
  roles: [nginx]

# LLM Services - Deploy backends first, then proxy
- name: Deploy LLM Inference Backends (can run in parallel)
  hosts: ollama:vllm
  roles:
    - role: ollama
      when: "'ollama' in group_names"
      tags: [llm, ollama]
    - role: vllm
      when: "'vllm' in group_names"
      tags: [llm, vllm]

- name: Deploy LiteLLM Proxy (depends on backends)
  hosts: litellm
  roles:
    - role: litellm
      tags: [llm, litellm]
