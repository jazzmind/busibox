---
# Centralized mapping of vault secrets to environment variable names.
#
# All .env templates and Ansible environment blocks should reference
# busibox_secrets.X instead of raw secrets.* expressions. This ensures:
#   - Single source of truth for secret-to-env-var mapping
#   - Consistent derivation logic across Docker, Proxmox, and K8s backends
#   - Adding a new secret only requires updating this file
#
# Usage:
#   Load after vault secrets are available:
#     - include_vars:
#         file: "{{ playbook_dir }}/roles/secrets/vars/shared_secrets.yml"
#
#   Reference in templates/tasks:
#     POSTGRES_PASSWORD={{ busibox_secrets.POSTGRES_PASSWORD }}
#
# Note: nested lookups use (secrets.X | default({})).Y to handle vaults
# that don't have the parent dict defined yet.

busibox_secrets:
  # Database
  POSTGRES_PASSWORD: "{{ (secrets.postgresql | default({})).password | default(postgres_password | default('')) }}"
  POSTGRES_USER: "{{ postgres_user | default('busibox_user') }}"

  # MinIO
  MINIO_ROOT_USER: "{{ (secrets.minio | default({})).root_user | default('') }}"
  MINIO_ROOT_PASSWORD: "{{ (secrets.minio | default({})).root_password | default('') }}"

  # Auth
  SSO_JWT_SECRET: "{{ secrets.jwt_secret | default('') }}"
  SESSION_SECRET: "{{ secrets.session_secret | default('') }}"
  AUTHZ_MASTER_KEY: "{{ secrets.authz_master_key | default('') }}"

  # LiteLLM
  LITELLM_MASTER_KEY: "{{ secrets.litellm_master_key | default(secrets.litellm_api_key | default('')) }}"
  LITELLM_SALT_KEY: "{{ secrets.litellm_salt_key | default(secrets.litellm_master_key | default(secrets.litellm_api_key | default(''))) }}"

  # Neo4j
  NEO4J_PASSWORD: "{{ (secrets.neo4j | default({})).password | default(neo4j_password | default('')) }}"

  # Config API encryption
  CONFIG_ENCRYPTION_KEY: "{{ secrets.encryption_key | default((secrets.config_api | default({})).encryption_key | default('')) }}"

  # GitHub
  GITHUB_AUTH_TOKEN: >-
    {{ (secrets.github | default({})).personal_access_token
       if ((secrets.github | default({})).personal_access_token | default('') | length > 0)
          and not ((secrets.github | default({})).personal_access_token | default('') is match('CHANGE_ME.*'))
       else (github_token | default(lookup('env', 'GITHUB_AUTH_TOKEN')) | default('')) }}

  # Admin
  ADMIN_EMAILS: "{{ secrets.admin_emails | default(secrets.admin_email | default('')) }}"
  ALLOWED_EMAIL_DOMAINS: "{{ secrets.allowed_email_domains | default('*') }}"

  # External API keys
  OPENAI_API_KEY: "{{ (secrets.openai | default({})).api_key | default('') }}"
