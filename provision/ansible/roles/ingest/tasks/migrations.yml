---
# Apply database migrations for ingestion service

- name: Create migrations directory
  file:
    path: /srv/ingest/migrations
    state: directory
    mode: '0755'
  tags: [ingest, ingest_migrations]

- name: Copy migration files
  copy:
    src: "{{ playbook_dir }}/../../srv/ingest/migrations/"
    dest: /srv/ingest/migrations/
    mode: '0644'
  tags: [ingest, ingest_migrations]

- name: Check if multi-flow migration has been applied
  shell: |
    PGPASSWORD='{{ secrets.postgresql.password }}' psql -h {{ postgres_host }} -U {{ postgres_user }} -d {{ files_db }} -tAc \
    "SELECT EXISTS (SELECT 1 FROM information_schema.columns WHERE table_name='ingestion_chunks' AND column_name='processing_strategy');"
  register: migration_check
  changed_when: false
  tags: [ingest, ingest_migrations]

- name: Apply multi-flow support migration
  shell: |
    PGPASSWORD='{{ secrets.postgresql.password }}' psql -h {{ postgres_host }} -U {{ postgres_user }} -d {{ files_db }} -f /srv/ingest/migrations/add_multi_flow_support.sql
  when: migration_check.stdout == 'f'
  register: migration_result
  tags: [ingest, ingest_migrations]

- name: Display migration status
  debug:
    msg: "{{ 'Migration applied successfully' if migration_result.changed else 'Migration already applied' }}"
  tags: [ingest, ingest_migrations]

