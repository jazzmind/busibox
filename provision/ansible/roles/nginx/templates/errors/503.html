<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>503 - Service Unavailable</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #333;
        }
        .container {
            text-align: center;
            background: white;
            padding: 3rem 2rem;
            border-radius: 1rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
        }
        h1 { font-size: 6rem; color: #fa709a; margin-bottom: 1rem; }
        h2 { font-size: 1.5rem; color: #555; margin-bottom: 1rem; }
        p { color: #777; margin-bottom: 2rem; line-height: 1.6; }
        .info { background: #fef9f5; padding: 1rem; border-radius: 0.5rem; font-size: 0.9rem; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <h1>503</h1>
        <h2>Service Unavailable</h2>
        <p>The service is temporarily unavailable due to maintenance or high load.</p>
        <div class="info">
            Please try again in a few moments. If the problem persists, contact support.
        </div>
    </div>
</body>
</html>
