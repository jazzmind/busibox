---
# Deploy placeholder HTML pages for testing routing
# This helps verify NGINX configuration before apps are deployed

- name: Create placeholder web root directory
  file:
    path: /var/www/placeholder
    state: directory
    mode: '0755'
    owner: www-data
    group: www-data

- name: Deploy main placeholder page (ai-portal/home)
  copy:
    content: |
      <!DOCTYPE html>
      <html lang="en">
      <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>AI Portal - Coming Soon</title>
          <style>
              body {
                  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                  display: flex;
                  justify-content: center;
                  align-items: center;
                  min-height: 100vh;
                  margin: 0;
                  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                  color: white;
              }
              .container {
                  text-align: center;
                  padding: 2rem;
                  background: rgba(255, 255, 255, 0.1);
                  border-radius: 20px;
                  backdrop-filter: blur(10px);
                  box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
              }
              h1 { font-size: 3rem; margin: 0 0 1rem 0; }
              p { font-size: 1.2rem; opacity: 0.9; }
              .info { margin-top: 2rem; font-size: 0.9rem; opacity: 0.7; }
          </style>
      </head>
      <body>
          <div class="container">
              <h1>🚀 AI Portal</h1>
              <p>Coming Soon</p>
              <div class="info">
                  <p>This is a placeholder page</p>
                  <p>Domain: {{ full_domain }}</p>
                  <p>Path: /</p>
              </div>
          </div>
      </body>
      </html>
    dest: /var/www/placeholder/index.html
    mode: '0644'
    owner: www-data
    group: www-data

