---
# Docker Compose Exec Task
#
# Usage:
#   - include_role:
#       name: docker_common
#       tasks_from: compose_exec
#     vars:
#       docker_exec_service: "postgres"
#       docker_exec_command: "pg_isready -U postgres"
#       docker_exec_user: "root"  # optional

- name: Sanitize Docker config (macOS keychain workaround)
  ansible.builtin.include_tasks: sanitize_docker_config.yml

- name: Set compose command arguments
  ansible.builtin.set_fact:
    docker_compose_file_args: "{{ docker_compose_files_list | map('regex_replace', '^(.*)$', '-f \\1') | join(' ') }}"

- name: Execute command in container
  ansible.builtin.shell: |
    cd {{ docker_compose_dir }}
    docker compose {{ docker_compose_file_args }} \
      exec {{ '-u ' ~ docker_exec_user if docker_exec_user is defined else '' }} \
      {{ docker_exec_service }} {{ docker_exec_command }}
  args:
    chdir: "{{ docker_compose_dir }}"
  environment:
    DOCKER_CONFIG: "{{ _docker_config_override }}"
    DOCKER_HOST: "{{ lookup('env', 'DOCKER_HOST') | default('', true) }}"
    COMPOSE_PROJECT_NAME: "{{ compose_project_name }}"
    CONTAINER_PREFIX: "{{ container_prefix | default('dev') }}"
    # Secrets from centralized busibox_secrets mapping
    POSTGRES_PASSWORD: "{{ busibox_secrets.POSTGRES_PASSWORD }}"
    MINIO_ROOT_USER: "{{ busibox_secrets.MINIO_ROOT_USER }}"
    MINIO_ROOT_PASSWORD: "{{ busibox_secrets.MINIO_ROOT_PASSWORD }}"
    MINIO_ACCESS_KEY: "{{ busibox_secrets.MINIO_ROOT_USER }}"
    MINIO_SECRET_KEY: "{{ busibox_secrets.MINIO_ROOT_PASSWORD }}"
    SSO_JWT_SECRET: "{{ busibox_secrets.SSO_JWT_SECRET }}"
    AUTHZ_MASTER_KEY: "{{ busibox_secrets.AUTHZ_MASTER_KEY }}"
    LITELLM_API_KEY: "{{ busibox_secrets.LITELLM_MASTER_KEY }}"
    LITELLM_MASTER_KEY: "{{ busibox_secrets.LITELLM_MASTER_KEY }}"
    LITELLM_SALT_KEY: "{{ busibox_secrets.LITELLM_SALT_KEY }}"
    NEO4J_PASSWORD: "{{ busibox_secrets.NEO4J_PASSWORD }}"
    CONFIG_ENCRYPTION_KEY: "{{ busibox_secrets.CONFIG_ENCRYPTION_KEY }}"
    GITHUB_AUTH_TOKEN: "{{ busibox_secrets.GITHUB_AUTH_TOKEN }}"
    ADMIN_EMAIL: "{{ busibox_secrets.ADMIN_EMAILS }}"
    ALLOWED_EMAIL_DOMAINS: "{{ busibox_secrets.ALLOWED_EMAIL_DOMAINS }}"
  register: _exec_result
  changed_when: false
  failed_when: docker_exec_fail_on_error | default(true) and _exec_result.rc != 0
  no_log: "{{ docker_exec_no_log | default(false) }}"

# Expose result as a fact so callers can access it
- name: Set exec result fact
  ansible.builtin.set_fact:
    exec_result: "{{ _exec_result }}"
