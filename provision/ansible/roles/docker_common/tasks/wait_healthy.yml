---
# Wait for Service Health Task
#
# Usage:
#   - include_role:
#       name: docker_common
#       tasks_from: wait_healthy
#     vars:
#       docker_wait_service: "postgres"
#       docker_wait_timeout: 60

- name: Sanitize Docker config (macOS keychain workaround)
  ansible.builtin.include_tasks: sanitize_docker_config.yml

- name: Check if environment file exists
  ansible.builtin.stat:
    path: "{{ docker_env_file }}"
  register: _env_file_stat

- name: Set compose command arguments
  ansible.builtin.set_fact:
    docker_compose_file_args: "{{ docker_compose_files_list | map('regex_replace', '^(.*)$', '-f \\1') | join(' ') }}"
    _env_file_arg: "{{ '--env-file ' ~ docker_env_file if _env_file_stat.stat.exists else '' }}"
    _compose_cmd: "docker compose {{ docker_compose_files_list | map('regex_replace', '^(.*)$', '-f \\1') | join(' ') }} {{ '--env-file ' ~ docker_env_file if _env_file_stat.stat.exists else '' }}"

- name: "Wait for {{ docker_wait_service }} to be healthy"
  ansible.builtin.shell:
    cmd: |
      timeout=${WAIT_TIMEOUT}
      elapsed=0

      # Detect JSON parser: prefer jq, fall back to python3
      if command -v jq >/dev/null 2>&1; then
        parse_health() { echo "$1" | jq -r 'if type == "array" then .[0].Health else .Health end // "none"' 2>/dev/null; }
        parse_state() { echo "$1" | jq -r 'if type == "array" then .[0].State else .State end // "none"' 2>/dev/null; }
      elif command -v python3 >/dev/null 2>&1; then
        parse_health() { echo "$1" | python3 -c "import sys,json; d=json.load(sys.stdin); o=d[0] if isinstance(d,list) else d; print(o.get('Health','none'))" 2>/dev/null || echo "none"; }
        parse_state() { echo "$1" | python3 -c "import sys,json; d=json.load(sys.stdin); o=d[0] if isinstance(d,list) else d; print(o.get('State','none'))" 2>/dev/null || echo "none"; }
      else
        echo "WARNING: Neither jq nor python3 found — cannot parse health status"
        exit 1
      fi

      while [ $elapsed -lt $timeout ]; do
        json_output=$(${COMPOSE_CMD} ps --format json ${WAIT_SERVICE} 2>/dev/null)
        health=$(parse_health "$json_output")

        case "$health" in
          healthy)
            echo "Service ${WAIT_SERVICE} is healthy"
            exit 0
            ;;
          unhealthy)
            echo "Service ${WAIT_SERVICE} is unhealthy (elapsed ${elapsed}s/${timeout}s), waiting for restart..."
            ;;
          starting)
            # During Docker's start_period, health status is "starting"
            ;;
          none|null|"")
            state=$(parse_state "$json_output")
            if [ "$state" = "running" ]; then
              echo "Service ${WAIT_SERVICE} is running (no healthcheck)"
              exit 0
            fi
            ;;
        esac

        sleep 2
        elapsed=$((elapsed + 2))
      done
      echo "Timeout waiting for ${WAIT_SERVICE}"
      exit 1
    chdir: "{{ docker_compose_dir }}"
    executable: /bin/bash
  environment:
    DOCKER_CONFIG: "{{ _docker_config_override }}"
    DOCKER_HOST: "{{ lookup('env', 'DOCKER_HOST') | default('', true) }}"
    COMPOSE_PROJECT_NAME: "{{ compose_project_name }}"
    COMPOSE_CMD: "{{ _compose_cmd }}"
    WAIT_SERVICE: "{{ docker_wait_service }}"
    WAIT_TIMEOUT: "{{ docker_wait_timeout | default(60) }}"
    CONTAINER_PREFIX: "{{ container_prefix | default('dev') }}"
    POSTGRES_PASSWORD: "{{ busibox_secrets.POSTGRES_PASSWORD }}"
    MINIO_ROOT_USER: "{{ busibox_secrets.MINIO_ROOT_USER }}"
    MINIO_ROOT_PASSWORD: "{{ busibox_secrets.MINIO_ROOT_PASSWORD }}"
    MINIO_ACCESS_KEY: "{{ busibox_secrets.MINIO_ROOT_USER }}"
    MINIO_SECRET_KEY: "{{ busibox_secrets.MINIO_ROOT_PASSWORD }}"
    NEO4J_PASSWORD: "{{ busibox_secrets.NEO4J_PASSWORD }}"
    CONFIG_ENCRYPTION_KEY: "{{ busibox_secrets.CONFIG_ENCRYPTION_KEY }}"
    LITELLM_MASTER_KEY: "{{ busibox_secrets.LITELLM_MASTER_KEY }}"
    LITELLM_API_KEY: "{{ busibox_secrets.LITELLM_MASTER_KEY }}"
    AUTHZ_MASTER_KEY: "{{ busibox_secrets.AUTHZ_MASTER_KEY }}"
    SSO_JWT_SECRET: "{{ busibox_secrets.SSO_JWT_SECRET }}"
    GITHUB_AUTH_TOKEN: "{{ busibox_secrets.GITHUB_AUTH_TOKEN }}"
  register: wait_result
  changed_when: false
