[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --strict-markers
    --tb=short
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (DB, HTTP)
    e2e: End-to-end tests (full stack)
